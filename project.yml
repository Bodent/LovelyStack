name: LovelyStack
options:
  minimumXcodeGenVersion: 2.45.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
configs:
  Debug: debug
  Release: release
targets:
  ShelfDropCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/ShelfDropCore
    settings:
      base:
        PRODUCT_NAME: ShelfDropCore
        PRODUCT_BUNDLE_IDENTIFIER: com.lovelystack.ShelfDropCore
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  ShelfDropApp:
    type: application
    platform: macOS
    sources:
      - path: Sources/ShelfDropApp
    info:
      path: Config/ShelfDrop-Info.plist
      properties:
        CFBundleDisplayName: ShelfDrop
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        NSServices:
          - NSMenuItem:
              default: Add to Shelf
            NSMessage: addToShelf
            NSPortName: ShelfDrop
            NSSendFileTypes:
              - public.item
            NSServiceDescription: Add selected files and folders to the active ShelfDrop shelf.
    entitlements:
      path: Config/ShelfDrop.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.application-groups:
          - group.com.lovelystack.shared
    dependencies:
      - target: ShelfDropCore
      - target: ShelfDropFinderAction
        embed: true
        copy:
          destination: plugins
    settings:
      base:
        PRODUCT_NAME: ShelfDrop
        PRODUCT_BUNDLE_IDENTIFIER: com.lovelystack.ShelfDrop
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
  ShelfDropFinderAction:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/ShelfDropFinderAction
    info:
      path: Config/ShelfDropFinderAction-Info.plist
      properties:
        CFBundleDisplayName: Add to Shelf
        NSExtension:
          NSExtensionPointIdentifier: com.apple.ui-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShelfFinderActionRequestHandler
          NSExtensionAttributes:
            NSExtensionServiceRoleType: Viewer
            NSExtensionServiceAllowsFinderPreviewItem: true
            NSExtensionServiceFinderPreviewLabel: Add to Shelf
            NSExtensionServiceFinderPreviewIconName: square.stack.3d.up.fill
            NSExtensionActivationRule:
              NSExtensionActivationSupportsAttachmentsWithMinCount: 1
              NSExtensionActivationSupportsFileWithMaxCount: 100
    entitlements:
      path: Config/ShelfDropFinderAction.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.application-groups:
          - group.com.lovelystack.shared
    dependencies:
      - target: ShelfDropCore
    settings:
      base:
        PRODUCT_NAME: ShelfDropFinderAction
        PRODUCT_BUNDLE_IDENTIFIER: com.lovelystack.ShelfDropFinderAction
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGNING_ALLOWED: NO
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.2.0
  ShelfDropCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ShelfDropCoreTests
    dependencies:
      - target: ShelfDropCore
    settings:
      base:
        PRODUCT_NAME: ShelfDropCoreTests
        PRODUCT_BUNDLE_IDENTIFIER: com.lovelystack.ShelfDropCoreTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  ShelfDropAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/ShelfDropAppTests
    dependencies:
      - target: ShelfDropApp
      - target: ShelfDropCore
    settings:
      base:
        PRODUCT_NAME: ShelfDropAppTests
        PRODUCT_BUNDLE_IDENTIFIER: com.lovelystack.ShelfDropAppTests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        BUNDLE_LOADER: $(BUILT_PRODUCTS_DIR)/ShelfDrop.app/Contents/MacOS/ShelfDrop
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShelfDrop.app/Contents/MacOS/ShelfDrop
schemes:
  ShelfDrop:
    build:
      targets:
        ShelfDropApp: all
        ShelfDropCore: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShelfDropCoreTests
        - ShelfDropAppTests
