name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: xcodebuild -project LovelyStack.xcodeproj -scheme ShelfDrop -configuration Debug build

      - name: Run app and core tests
        run: xcodebuild -project LovelyStack.xcodeproj -scheme ShelfDrop -configuration Debug test -only-testing:ShelfDropAppTests -only-testing:ShelfDropCoreTests
